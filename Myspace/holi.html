<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Holi from Guddu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- GLOBAL STYLES & HAMMER CURSOR --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Background Image for Holi */
            background-image: url("vecteezy_hand-draw-fun-characters-celebrate-colorful-holi-card_6249658.svg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            /* Standard Hammer Cursor */
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32'><text x='0' y='24' font-size='24'>🔨</text></svg>") 16 16, auto;
        }

        /* Swinging Hammer when clicking */
        body:active {
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32'><text x='0' y='24' font-size='24' transform='rotate(-30 16 16)'>🔨</text></svg>") 16 16, auto;
        }

        /* --- 3D GLASS CARD --- */
        .glass-card {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            z-index: 10;
        }

        .card-content {
            transform: translateZ(50px);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff00cc, #3333ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(2px 2px 4px rgba(0, 0, 0, 0.3));
        }

        /* --- COUNTDOWN --- */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.3);
            padding: 10px 15px;
            border-radius: 10px;
            color: #333;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        /* --- BUTTONS --- */
        .btn-start {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.2rem;
            /* Revert back to pointer just for buttons so they feel clickable */
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 75, 43, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 20px;
        }

        .btn-start:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 75, 43, 0.6);
        }

        .btn-share {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        /* --- BALLOON GAME --- */
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .score-board {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
            color: #fff;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
            display: none;
            z-index: 20;
        }

        .balloon {
            position: absolute;
            bottom: -100px;
            width: 60px;
            height: 80px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            /* Force the hammer cursor on balloons too */
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32'><text x='0' y='24' font-size='24'>🔨</text></svg>") 16 16, pointer !important;
            pointer-events: auto;
            animation: floatUp linear infinite;
            box-shadow: inset -5px -5px 10px rgba(0, 0, 0, 0.2);
        }

        .balloon::before {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 10px;
            background: inherit;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
            }

            100% {
                transform: translateY(-120vh) rotate(20deg);
            }
        }

        /* --- FIREWORKS / COLOR SPLASHES --- */
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: explode 0.8s ease-out forwards;
            z-index: 15;
        }

        @keyframes explode {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(5) translate(var(--tx), var(--ty));
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <audio id="holi-audio" loop preload="auto">
        <source src="Saree.mp3" type="audio/mpeg">
        <source src="Saree.mp3" type="audio/mp3">
    </audio>

    <div class="score-board" id="score-board">Balloons Smashed: <span id="score">0</span></div>

    <div id="game-container"></div>

    <div class="glass-card" id="glass-card">
        <div class="card-content">
            <h1>🎭 Happy Holi from Arunaksha🎭</h1>
            <p style="color: #444; margin-bottom: 10px;">Get ready for the festival of colors!</p>

            <div class="countdown" id="countdown">
                <div class="time-box"><span id="days">0</span>d</div>
                <div class="time-box"><span id="hours">0</span>h</div>
                <div class="time-box"><span id="mins">0</span>m</div>
                <div class="time-box"><span id="secs">0</span>s</div>
            </div>

            <button class="btn-start" id="start-btn">
                🎉 Start Celebration
            </button>
            <br>
            <button class="btn-share" id="share-btn">
                <i class="fa-brands fa-instagram"></i> Share on IG
            </button>
        </div>
    </div>

    <script>
        // --- 1. 3D GLASS CARD TILT EFFECT ---
        const card = document.getElementById('glass-card');
        document.addEventListener('mousemove', (e) => {
            let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });
        document.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

        // --- 2. LIVE COUNTDOWN (Target: March 3, 2026) ---
        const targetDate = new Date("March 3, 2026 00:00:00").getTime();

        const updateCountdown = setInterval(() => {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                clearInterval(updateCountdown);
                document.getElementById('countdown').innerHTML = "<h2 style='color:#e6683c;'>It's Holi! Smash the Balloons!</h2>";
                return;
            }

            document.getElementById('days').innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
            document.getElementById('hours').innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('mins').innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById('secs').innerText = Math.floor((distance % (1000 * 60)) / 1000);
        }, 1000);

        // --- 3. START BUTTON & AUDIO LOGIC ---
        const startBtn = document.getElementById('start-btn');
        const audio = document.getElementById('holi-audio');
        const gameContainer = document.getElementById('game-container');
        const scoreBoard = document.getElementById('score-board');
        let gameActive = false;
        let score = 0;

        startBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play().catch(e => {
                    console.error("Audio play failed.", e);
                    alert("Audio playback failed. Please check if 'Saree.mp3' is valid, or if your browser is blocking local file audio playback.\nError: " + e.message);
                });
            }

            startBtn.innerText = "🎶 Playing & Game On!";
            scoreBoard.style.display = "block";

            createFireworks(window.innerWidth / 2, window.innerHeight / 2);

            if (!gameActive) {
                gameActive = true;
                setInterval(spawnBalloon, 800); // Spawns a balloon every 0.8 seconds
            }
        });

        // --- 4. BALLOON SMASH GAME ---
        const colors = ['#FF1493', '#00FF00', '#FF4500', '#1E90FF', '#FFFF00', '#9400D3'];

        function spawnBalloon() {
            const balloon = document.createElement('div');
            balloon.classList.add('balloon');

            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            const randomLeft = Math.random() * 90;
            const duration = Math.random() * 3 + 4;

            balloon.style.backgroundColor = randomColor;
            balloon.style.left = `${randomLeft}vw`;
            balloon.style.animationDuration = `${duration}s`;

            // Smash Event
            balloon.addEventListener('mousedown', (e) => {
                score++;
                document.getElementById('score').innerText = score;
                createFireworks(e.clientX, e.clientY, randomColor);
                balloon.remove();
            });

            gameContainer.appendChild(balloon);

            setTimeout(() => {
                if (balloon.parentElement) balloon.remove();
            }, duration * 1000);
        }

        // --- 5. FIREWORKS / COLOR SPLASHES ---
        function createFireworks(x, y, color = null) {
            const numParticles = 15;
            for (let i = 0; i < numParticles; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');

                const pColor = color || colors[Math.floor(Math.random() * colors.length)];
                particle.style.backgroundColor = pColor;

                const size = Math.random() * 15 + 5;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;

                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 100 + 50;
                particle.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
                particle.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);

                document.body.appendChild(particle);

                setTimeout(() => particle.remove(), 800);
            }
        }

        // --- 6. INSTAGRAM SHARE BUTTON ---
        const shareBtn = document.getElementById('share-btn');
        shareBtn.addEventListener('click', () => {
            const shareData = {
                title: 'Happy Holi from Guddu!',
                text: 'Come smash some balloons and celebrate Holi 2026 with me!',
                url: window.location.href
            };

            if (navigator.share) {
                navigator.share(shareData).catch(console.error);
            } else {
                navigator.clipboard.writeText(shareData.url);
                alert("Link copied to clipboard! Share it with your friends.");
            }
        });
    </script>
</body>

</html>
